<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>AI Digest</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --accent:    #7b61ff;
      --accent2:   #00d4aa;
      --text:      #e8e8f0;
      --muted:     #6b6b8a;
      --danger:    #ff4d6d;
      --card-bg:   #13131c;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(123,97,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(0,212,170,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 16px 80px; }

    /* ── Header ── */
    header {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .tagline {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-left: 48px;
    }

    /* ── API Key setup ── */
    #setup-section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
    }
    #setup-section h2 {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }
    #setup-section p {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    #setup-section a { color: var(--accent); text-decoration: none; }
    .input-row { display: flex; gap: 10px; }
    input[type="password"], input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }

    /* ── Buttons ── */
    button {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      border: none;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9b7fff);
      color: #fff;
      padding: 10px 20px;
      white-space: nowrap;
    }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 14px;
      font-size: 11px;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Controls bar ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .dot.live { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse 2s infinite; }
    .dot.loading { background: var(--accent); animation: pulse 0.8s infinite; }
    .dot.error { background: var(--danger); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    /* ── Tab bar (archive days) ── */
    .tab-bar {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 28px;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab:hover { border-color: var(--accent); color: var(--text); }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Loading skeleton ── */
    .skeleton-wrap { display: flex; flex-direction: column; gap: 16px; }
    .skeleton {
      background: linear-gradient(90deg, var(--card-bg) 25%, var(--border) 50%, var(--card-bg) 75%);
      background-size: 200% 100%;
      border-radius: 10px;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Digest content ── */
    #digest-content { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }

    .section-block { margin-bottom: 36px; }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Headline list ── */
    .headline-list { display: flex; flex-direction: column; }

    .headline-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 4px;
    }
    .headline-item:last-child { border-bottom: none; }
    .headline-item:hover .headline-text { color: var(--accent); }
    .headline-item:hover .headline-arrow { color: var(--accent); transform: translateX(2px); }
    .headline-item:active { background: rgba(123,97,255,0.06); }

    .headline-num {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      width: 18px;
      flex-shrink: 0;
      text-align: right;
    }

    .headline-text {
      flex: 1;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      transition: color 0.15s;
    }
    .headline-text.no-link { color: var(--muted); font-weight: 400; font-size: 13px; }

    .headline-arrow {
      font-size: 14px;
      color: var(--muted);
      flex-shrink: 0;
      transition: color 0.15s, transform 0.15s;
    }

    /* ── Empty / error states ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .big-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 16px; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 12px; line-height: 1.7; max-width: 280px; margin: 0 auto; }

    .error-banner {
      background: rgba(255,77,109,0.08);
      border: 1px solid rgba(255,77,109,0.25);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 12px;
      color: #ff8099;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px 0;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 40px;
      letter-spacing: 0.05em;
    }

    /* ── Key indicator ── */
    .key-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--accent2);
      margin-bottom: 12px;
    }
    .key-indicator button {
      font-size: 10px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      font-family: 'DM Mono', monospace;
      padding: 0;
    }
    .key-indicator button:hover { color: var(--danger); }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo-row">
      <div class="logo-icon">⚡</div>
      <h1>AI Digest</h1>
    </div>
    <div class="tagline">Your daily intelligence briefing</div>
  </header>

  <!-- API Key Setup -->
  <div id="setup-section" style="display:none;">
    <h2>Enter your Anthropic API Key</h2>
    <p>
      Your key is stored only in this browser — never sent anywhere except directly to Anthropic.<br>
      Get one free at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </p>
    <div class="input-row">
      <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" />
      <button class="btn-primary" onclick="saveKey()">Save</button>
    </div>
  </div>

  <!-- Key indicator when saved -->
  <div id="key-indicator" class="key-indicator" style="display:none;">
    <span>✓ API key saved</span>
    <button onclick="clearKey()">change</button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="status-pill">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
    <button class="btn-primary" id="refresh-btn" onclick="fetchDigest()" disabled>
      ⚡ Fetch Today's Digest
    </button>
  </div>

  <!-- Archive tabs -->
  <div class="tab-bar" id="tab-bar" style="display:none;"></div>

  <!-- Error banner -->
  <div class="error-banner" id="error-banner" style="display:none;"></div>

  <!-- Main content -->
  <div id="digest-content"></div>

  <footer>AI Digest · Powered by Claude with live web search</footer>
</div>

<script>
  const STORAGE_KEY = 'ai_digest_archive';
  const KEY_STORAGE  = 'ai_digest_apikey';
  const MAX_DAYS = 7;

  let archive = [];       // array of { date, label, sections }
  let currentIndex = 0;  // which day we're viewing

  // ── Init ──────────────────────────────────────────────────────────────────
  function init() {
    archive = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    const key = localStorage.getItem(KEY_STORAGE);
    if (key) {
      showKeyIndicator();
      document.getElementById('refresh-btn').disabled = false;
    } else {
      document.getElementById('setup-section').style.display = 'block';
    }
    if (archive.length > 0) {
      currentIndex = 0;
      renderTabs();
      renderDigest(archive[0]);
    } else {
      showEmpty();
    }
  }

  // ── API Key management ────────────────────────────────────────────────────
  function saveKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val.startsWith('sk-')) { alert('That doesn\'t look like a valid key (should start with sk-)'); return; }
    localStorage.setItem(KEY_STORAGE, val);
    document.getElementById('setup-section').style.display = 'none';
    document.getElementById('api-key-input').value = '';
    showKeyIndicator();
    document.getElementById('refresh-btn').disabled = false;
  }

  function showKeyIndicator() {
    document.getElementById('key-indicator').style.display = 'flex';
  }

  function clearKey() {
    localStorage.removeItem(KEY_STORAGE);
    document.getElementById('key-indicator').style.display = 'none';
    document.getElementById('setup-section').style.display = 'block';
    document.getElementById('refresh-btn').disabled = true;
  }

  // ── Fetch digest ──────────────────────────────────────────────────────────
  async function fetchDigest() {
    const apiKey = localStorage.getItem(KEY_STORAGE);
    if (!apiKey) return;

    setStatus('loading', 'Fetching AI news...');
    document.getElementById('refresh-btn').disabled = true;
    document.getElementById('error-banner').style.display = 'none';
    showSkeleton();

    const today = new Date();
    const label = today.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const isoDate = today.toISOString().split('T')[0];

    const prompt = `You are an expert AI industry analyst. Today is ${label}.

Search the web and produce a daily AI digest covering the last 24 hours.

Cover these four topics:
1. New Model Releases & Updates — new models, announcements, version updates, benchmarks
2. AI Research & Papers — notable arXiv papers, breakthroughs, interesting findings
3. AI Tools & Apps — new tools, product launches, major feature updates, developer APIs
4. Tutorials & How-Tos — useful guides, tips, techniques shared by the community

Focus equally on: Anthropic/Claude, OpenAI/ChatGPT, Google DeepMind/Gemini, Open source AI (Meta, Mistral, Hugging Face), and AI startups.

CRITICAL FORMATTING RULES:
- Respond with valid JSON only — absolutely no markdown, no backticks, no preamble, no text outside the JSON
- Keep each "body" field to 1-2 short paragraphs maximum (under 300 characters each)
- Keep each "why" field to one short sentence (under 150 characters)
- Include no more than 4 items per section
- Every item MUST have a real "source" URL — a direct link to the actual article, paper, or page. Do not use null.
- All string values must be properly escaped (no unescaped quotes, newlines as \\n only)

Use this exact JSON structure:
{"sections":[{"title":"🚀 New Model Releases & Updates","items":[{"title":"Item title","body":"Short paragraph here.","why":"One sentence why it matters.","source":"https://example.com"}]},{"title":"📄 AI Research & Papers","items":[{"title":"Item title","body":"Short paragraph here.","why":"One sentence why it matters.","source":null}]},{"title":"🛠️ AI Tools & Apps","items":[{"title":"Item title","body":"Short paragraph here.","why":"One sentence.","source":null}]},{"title":"📚 Tutorials & How-Tos","items":[{"title":"Item title","body":"Short paragraph here.","why":"One sentence.","source":null}]}]}`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 8000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || `API error ${res.status}`);
      }

      const data = await res.json();

      // Extract text from response
      let rawText = '';
      for (const block of data.content) {
        if (block.type === 'text') rawText += block.text;
      }

      // Robust JSON extraction and repair
      const parsed = extractAndRepairJSON(rawText);
      if (!parsed) throw new Error('Could not parse response. Please try again.');

      const entry = { date: isoDate, label, sections: parsed.sections };

      // Rotate archive — remove if same day exists, prepend new
      archive = archive.filter(e => e.date !== isoDate);
      archive.unshift(entry);
      if (archive.length > MAX_DAYS) archive = archive.slice(0, MAX_DAYS);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(archive));

      currentIndex = 0;
      renderTabs();
      renderDigest(entry);
      setStatus('live', `Updated ${label}`);

    } catch (err) {
      console.error(err);
      showError(err.message);
      setStatus('error', 'Error — try again');
      if (archive.length > 0) renderDigest(archive[currentIndex]);
      else showEmpty();
    } finally {
      document.getElementById('refresh-btn').disabled = false;
    }
  }

  // ── Render helpers ────────────────────────────────────────────────────────
  function renderTabs() {
    const bar = document.getElementById('tab-bar');
    if (archive.length === 0) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    bar.innerHTML = archive.map((e, i) => `
      <div class="tab ${i === currentIndex ? 'active' : ''}" onclick="switchDay(${i})">
        ${i === 0 ? 'Today' : e.label}
      </div>
    `).join('');
  }

  function switchDay(i) {
    currentIndex = i;
    renderTabs();
    renderDigest(archive[i]);
  }

  function renderDigest(entry) {
    const el = document.getElementById('digest-content');
    if (!entry || !entry.sections) { showEmpty(); return; }

    el.innerHTML = entry.sections.map(sec => `
      <div class="section-block">
        <div class="section-title">${esc(sec.title)}</div>
        <div class="headline-list">
          ${(sec.items || []).map((item, i) => {
            const hasLink = item.source && item.source.startsWith('http');
            if (hasLink) {
              return `
                <a class="headline-item" href="${esc(item.source)}" target="_blank" rel="noopener">
                  <span class="headline-num">${i + 1}</span>
                  <span class="headline-text">${esc(item.title)}</span>
                  <span class="headline-arrow">↗</span>
                </a>`;
            } else {
              return `
                <div class="headline-item" style="cursor:default;">
                  <span class="headline-num">${i + 1}</span>
                  <span class="headline-text no-link">${esc(item.title)}</span>
                </div>`;
            }
          }).join('')}
        </div>
      </div>
    `).join('');
  }

  function showEmpty() {
    document.getElementById('digest-content').innerHTML = `
      <div class="empty-state">
        <div class="big-icon">📡</div>
        <h3>No digest yet</h3>
        <p>Hit "Fetch Today's Digest" to pull the latest AI news from across the web.</p>
      </div>`;
  }

  function showSkeleton() {
    document.getElementById('digest-content').innerHTML = `
      <div class="skeleton-wrap">
        ${[80,55,90,65,75,50,85,60].map(w => `
          <div class="skeleton" style="height:${w > 70 ? 120 : 60}px; width:${w}%;"></div>
        `).join('')}
      </div>`;
  }

  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
  }

  function setStatus(type, text) {
    document.getElementById('status-text').textContent = text;
    const dot = document.getElementById('status-dot');
    dot.className = 'dot ' + type;
  }

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ── Robust JSON extractor & repairer ────────────────────────────────────
  function extractAndRepairJSON(raw) {
    // 1. Strip markdown code fences if present
    let text = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();

    // 2. Find the outermost { ... }
    const start = text.indexOf('{');
    if (start === -1) return null;
    // Find matching closing brace by counting depth
    let depth = 0, end = -1;
    for (let i = start; i < text.length; i++) {
      if (text[i] === '{') depth++;
      else if (text[i] === '}') { depth--; if (depth === 0) { end = i; break; } }
    }
    let jsonStr = end !== -1 ? text.slice(start, end + 1) : text.slice(start);

    // 3. Try parsing as-is first
    try { return JSON.parse(jsonStr); } catch (_) {}

    // 4. Attempt auto-repair of common issues
    jsonStr = jsonStr
      // Remove trailing commas before } or ]
      .replace(/,\s*([}\]])/g, '$1')
      // Fix unescaped newlines inside strings (crude but effective)
      .replace(/("(?:[^"\\]|\\.)*")|(\n)/g, (m, str, nl) => str ? str : ' ');

    // 5. If JSON is truncated, close any open structures
    try { return JSON.parse(jsonStr); } catch (_) {}

    // 6. Last resort: close open brackets/braces
    const opens = [];
    for (const ch of jsonStr) {
      if (ch === '{' || ch === '[') opens.push(ch);
      else if (ch === '}' || ch === ']') opens.pop();
    }
    // Remove any trailing comma before we close
    jsonStr = jsonStr.replace(/,\s*$/, '');
    for (let i = opens.length - 1; i >= 0; i--) {
      jsonStr += opens[i] === '{' ? '}' : ']';
    }

    try { return JSON.parse(jsonStr); } catch (e) {
      console.error('JSON repair failed:', e, jsonStr.slice(-200));
      return null;
    }
  }

  init();
</script>
</body>
</html>
